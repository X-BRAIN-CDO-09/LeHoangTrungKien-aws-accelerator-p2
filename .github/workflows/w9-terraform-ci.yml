name: W9 Terraform CI

on:
  pull_request:
    branches:
      - main
    paths:
      - "cloud/w8/lab/**"
      - ".github/workflows/w9-terraform-ci.yml"
  push:
    branches:
      - main
    paths:
      - "cloud/w8/lab/**"
      - ".github/workflows/w9-terraform-ci.yml"
  workflow_dispatch:

concurrency:
  group: w9-terraform-${{ github.ref }}
  cancel-in-progress: false

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'ap-southeast-1' }}
  TF_IN_AUTOMATION: true
  TF_INPUT: false

jobs:
  terraform:
    name: Validate, Plan and Optional Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cloud/w8/lab

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials with OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.TF_AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.0"
          terraform_wrapper: false

      - name: Terraform format check
        run: terraform fmt -check -recursive

      - name: Terraform init
        run: terraform init -input=false

      - name: Terraform validate
        run: terraform validate

      - name: Terraform plan
        run: terraform plan -no-color -input=false

      - name: Terraform apply on main
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.ENABLE_TERRAFORM_APPLY == 'true'
        run: terraform apply -auto-approve -input=false
