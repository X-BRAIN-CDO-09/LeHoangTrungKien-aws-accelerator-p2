name: W9 GitOps Manifest Validation

on:
  pull_request:
    branches:
      - main
    paths:
      - "cloud/w9/w9-sang-gitops-final/k8s/**"
      - "cloud/w9/w9-sang-gitops-final/argocd/**"
      - ".github/workflows/w9-gitops-validate.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    name: Validate Kubernetes and ArgoCD manifests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSLo kubeconform.tar.gz \
            https://github.com/yannh/kubeconform/releases/download/v0.6.7/kubeconform-linux-amd64.tar.gz
          tar -xzf kubeconform.tar.gz
          sudo mv kubeconform /usr/local/bin/kubeconform
          kubeconform -v

      - name: Validate Kubernetes manifests
        run: |
          kubeconform \
            -strict \
            -summary \
            cloud/w9/w9-sang-gitops-final/k8s

      - name: Validate ArgoCD Application manifests
        run: |
          kubeconform \
            -strict \
            -summary \
            -ignore-missing-schemas \
            cloud/w9/w9-sang-gitops-final/argocd
