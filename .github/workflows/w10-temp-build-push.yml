# Build, scan, push and sign W10 temp API image.
name: W10 Temp Build, Scan, Push and Sign Image

on:
  push:
    branches:
      - main
    paths:
      - "cloud/w10/temp/src/api/**"
      - "cloud/w10/temp/app-api/rollout.yaml"
      - ".github/workflows/w10-temp-build-push.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: x-brain-cdo-09/lehoangtrungkien-aws-accelerator-p2/w10-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate semantic version
        id: semver
        uses: paulhatch/semantic-version@v5.4.0
        with:
          tag_prefix: "v"
          major_pattern: "(BREAKING CHANGE:|!:)"
          minor_pattern: "^feat"
          version_format: "${major}.${minor}.${patch}"
          bump_each_commit: false

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.semver.outputs.version }}
            type=sha,prefix=v${{ steps.semver.outputs.version }}-

      - name: Build Docker image locally
        run: |
          docker build \
            --label "org.opencontainers.image.revision=${{ github.sha }}" \
            -t "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}" \
            ./cloud/w10/temp/src/api

      - name: Trivy scan image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"

      - name: Check Cosign secrets
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          test -n "$COSIGN_PRIVATE_KEY"
          test -n "$COSIGN_PASSWORD"

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Docker image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}"
          docker push "$IMAGE"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign Docker image
        env:
          COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
          COSIGN_PRIVATE_KEY: ${{ secrets.COSIGN_PRIVATE_KEY }}
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}"
          printf "%s" "$COSIGN_PRIVATE_KEY" > cosign.key
          cosign sign --yes --key cosign.key "$IMAGE"
          rm -f cosign.key

      - name: Update rollout.yaml with new version
        run: |
          sed -i "s|image: ghcr.io/.*/.*w10-api:.*|image: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.semver.outputs.version }}|g" cloud/w10/temp/app-api/rollout.yaml
          sed -i "s|value: \"v.*\"|value: \"v${{ steps.semver.outputs.version }}\"|g" cloud/w10/temp/app-api/rollout.yaml

      - name: Commit and push version update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cloud/w10/temp/app-api/rollout.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(w10): bump temp api image to v${{ steps.semver.outputs.version }}"
            git push
          fi

      - name: Create git tag
        run: |
          if git rev-parse "v${{ steps.semver.outputs.version }}" >/dev/null 2>&1; then
            echo "Tag already exists"
          else
            git tag v${{ steps.semver.outputs.version }}
            git push origin v${{ steps.semver.outputs.version }}
          fi
