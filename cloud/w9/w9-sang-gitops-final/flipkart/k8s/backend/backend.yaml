apiVersion: apps/v1
kind: Deployment
metadata:
  name: flipkart-backend
  namespace: flipkart
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: flipkart-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flipkart-backend
  template:
    metadata:
      labels:
        app: flipkart-backend
    spec:
      containers:
        - name: backend
          image: docker.io/kienlht/flipkart-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: MONGO_URI
              value: mongodb://flipkart-mongodb:27017/flipkart
          envFrom:
            - secretRef:
                name: flipkart-backend-secrets
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: flipkart-backend
  namespace: flipkart
spec:
  selector:
    app: flipkart-backend
  ports:
    - name: http
      port: 4000
      targetPort: http
