apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: flipkart-backend
  namespace: flipkart
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  labels:
    app: flipkart-backend
spec:
  replicas: 4
  revisionHistoryLimit: 3
  minReadySeconds: 10
  progressDeadlineSeconds: 600
  selector:
    matchLabels:
      app: flipkart-backend
  template:
    metadata:
      labels:
        app: flipkart-backend
    spec:
      containers:
        - name: backend
          image: flipkart-backend:v1
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            - name: APP_VERSION
              value: "v1"
            - name: ERROR_RATE
              value: "0"
            - name: MONGO_URI
              value: mongodb://flipkart-mongodb:27017/flipkart
          envFrom:
            - secretRef:
                name: flipkart-backend-secrets
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  strategy:
    canary:
      stableService: flipkart-backend
      canaryService: flipkart-backend-canary
      maxSurge: 1
      maxUnavailable: 0
      scaleDownDelaySeconds: 30
      steps:
        - setWeight: 25
        - pause: {}
        - setWeight: 50
        - pause:
            duration: 30s
        - analysis:
            templates:
              - templateName: flipkart-backend-quality
        - setWeight: 100
