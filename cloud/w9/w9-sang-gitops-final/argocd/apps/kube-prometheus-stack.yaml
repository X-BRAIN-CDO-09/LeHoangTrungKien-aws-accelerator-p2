apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.1.1
    helm:
      values: |
        defaultRules:
          create: false

        kubeApiServer:
          enabled: false
        kubeControllerManager:
          enabled: false
        coreDns:
          enabled: false
        kubeEtcd:
          enabled: false
        kubeScheduler:
          enabled: false
        kubeProxy:
          enabled: false
        kubelet:
          enabled: false

        kube-state-metrics:
          enabled: false
        prometheus-node-exporter:
          enabled: false

        prometheusOperator:
          resources:
            requests:
              cpu: 50m
              memory: 100Mi
            limits:
              cpu: 200m
              memory: 256Mi

        prometheus:
          prometheusSpec:
            retention: 6h
            serviceMonitorSelectorNilUsesHelmValues: false
            ruleSelectorNilUsesHelmValues: false
            resources:
              requests:
                cpu: 100m
                memory: 256Mi
              limits:
                cpu: 500m
                memory: 512Mi

        grafana:
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi

        alertmanager:
          config:
            global:
              resolve_timeout: 5m
              smtp_from: kienl8890@gmail.com
              smtp_smarthost: smtp.gmail.com:465
              smtp_hello: gmail.com
              smtp_auth_username: kienl8890@gmail.com
              smtp_auth_identity: kienl8890@gmail.com
              smtp_auth_password_file: /etc/alertmanager/secrets/flipkart-alertmanager-smtp/smtp-password
              smtp_require_tls: true
              smtp_force_implicit_tls: true
            route:
              receiver: email-alerts
              group_by:
                - alertname
                - namespace
                - service
              group_wait: 30s
              group_interval: 5m
              repeat_interval: 4h
              routes:
                - matchers:
                    - severity="critical"
                  receiver: email-alerts
                - matchers:
                    - severity="warning"
                  receiver: email-alerts
            receivers:
              - name: email-alerts
                email_configs:
                  - to: kienl8890@gmail.com
                    send_resolved: true
            inhibit_rules:
              - source_matchers:
                  - severity="critical"
                target_matchers:
                  - severity="warning"
                equal:
                  - alertname
                  - namespace
                  - service
          alertmanagerSpec:
            secrets:
              - flipkart-alertmanager-smtp
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                cpu: 150m
                memory: 128Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
