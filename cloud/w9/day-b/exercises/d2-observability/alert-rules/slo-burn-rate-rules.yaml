apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: demo-app-slo-burn-rate
  namespace: observability
spec:
  groups:
    - name: demo-app.slo
      rules:
        - alert: DemoAppFastBurnRate
          expr: |
            demo_app:http_request_errors_per_requests:ratio_rate5m
              > (14.4 * 0.001)
            and
            demo_app:http_request_errors_per_requests:ratio_rate1h
              > (14.4 * 0.001)
          for: 2m
          labels:
            severity: critical
          annotations:
            summary: Demo app đang tiêu hao error budget rất nhanh
            description: Error ratio vượt ngưỡng fast burn trên cả cửa sổ 5m và 1h.

        - alert: DemoAppSlowBurnRate
          expr: |
            demo_app:http_request_errors_per_requests:ratio_rate30m
              > (6 * 0.001)
            and
            demo_app:http_request_errors_per_requests:ratio_rate6h
              > (6 * 0.001)
          for: 15m
          labels:
            severity: warning
          annotations:
            summary: Demo app đang tiêu hao error budget kéo dài
            description: Error ratio vượt ngưỡng slow burn trên cả cửa sổ 30m và 6h.
