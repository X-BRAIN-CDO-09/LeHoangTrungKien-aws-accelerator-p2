apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: flipkart-mongodb-data
  namespace: flipkart
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flipkart-mongodb
  namespace: flipkart
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flipkart-mongodb
  template:
    metadata:
      labels:
        app: flipkart-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: mongodb
              containerPort: 27017
          readinessProbe:
            tcpSocket:
              port: mongodb
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: mongodb
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /data/db
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: flipkart-mongodb-data
---
apiVersion: v1
kind: Service
metadata:
  name: flipkart-mongodb
  namespace: flipkart
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  selector:
    app: flipkart-mongodb
  ports:
    - name: mongodb
      port: 27017
      targetPort: mongodb
