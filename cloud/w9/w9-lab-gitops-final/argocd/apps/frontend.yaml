apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flipkart-frontend
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/X-BRAIN-CDO-09/LeHoangTrungKien-aws-accelerator-p2.git
    targetRevision: main
    path: cloud/w9/w9-lab-gitops-final/flipkart/k8s/frontend
  destination:
    server: https://kubernetes.default.svc
    namespace: flipkart
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
