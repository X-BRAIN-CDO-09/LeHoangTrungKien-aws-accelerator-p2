apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: w9-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<your-github-user>/<your-repo>.git
    targetRevision: main
    path: cloud/w9/day-a/argocd/apps
    directory:
      recurse: true
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

