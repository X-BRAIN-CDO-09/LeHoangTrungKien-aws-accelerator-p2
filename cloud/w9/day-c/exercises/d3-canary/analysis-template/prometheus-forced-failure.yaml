apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: demo-app-forced-failure
  namespace: demo
spec:
  args:
    - name: prometheus-address
      value: http://prometheus-operated.observability.svc.cluster.local:9090
  metrics:
    - name: forced-failure-drill
      interval: 10s
      count: 2
      failureLimit: 1
      successCondition: len(result) > 0 && result[0] == 1
      failureCondition: len(result) == 0 || result[0] != 1
      provider:
        prometheus:
          address: "{{args.prometheus-address}}"
          query: vector(0)
