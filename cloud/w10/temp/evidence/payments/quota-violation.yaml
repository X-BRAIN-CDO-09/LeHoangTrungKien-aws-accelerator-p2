apiVersion: v1
kind: Pod
metadata:
  name: payments-quota-violation
  namespace: payments
  labels:
    app: payments-quota-violation
    owner: payments-team
    tenant: payments
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
  containers:
    - name: app
      image: docker.io/library/busybox:1.36.1
      command: ["sh", "-c", "sleep 3600"]
      resources:
        requests:
          cpu: 50m
          memory: 3Gi
        limits:
          cpu: 100m
          memory: 3Gi
      securityContext:
        allowPrivilegeEscalation: false
