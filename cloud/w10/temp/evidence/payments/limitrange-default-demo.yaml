apiVersion: v1
kind: Pod
metadata:
  name: payments-limits-defaulted
  namespace: payments
  labels:
    app: payments-limits-defaulted
    owner: payments-team
    tenant: payments
spec:
  restartPolicy: Never
  imagePullSecrets:
    - name: ghcr-pull-secret
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
  containers:
    - name: app
      image: ghcr.io/x-brain-cdo-09/lehoangtrungkien-aws-accelerator-p2/w10-api:0.0.4
      command: ["sh", "-c", "sleep 3600"]
      securityContext:
        allowPrivilegeEscalation: false
