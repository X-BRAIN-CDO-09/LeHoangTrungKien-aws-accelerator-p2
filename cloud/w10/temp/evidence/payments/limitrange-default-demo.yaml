apiVersion: v1
kind: Pod
metadata:
  name: payments-limits-defaulted
  namespace: payments
  labels:
    app: payments-limits-defaulted
    owner: payments-team
    tenant: payments
spec:
  restartPolicy: Never
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
  containers:
    - name: app
      image: docker.io/library/busybox:1.36.1
      command: ["sh", "-c", "sleep 3600"]
      securityContext:
        allowPrivilegeEscalation: false
