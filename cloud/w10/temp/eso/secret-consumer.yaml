apiVersion: apps/v1
kind: Deployment
metadata:
  name: secret-consumer
  namespace: demo
  labels:
    app: secret-consumer
    owner: platform-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app: secret-consumer
  template:
    metadata:
      labels:
        app: secret-consumer
        owner: platform-team
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: reader
          image: docker.io/library/busybox:1.36.1
          command:
            - sh
            - -c
            - while true; do date; cat /etc/db/password || true; sleep 10; done
          volumeMounts:
            - name: db-secret
              mountPath: /etc/db
              readOnly: true
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          securityContext:
            allowPrivilegeEscalation: false
      volumes:
        - name: db-secret
          secret:
            secretName: db-secret
