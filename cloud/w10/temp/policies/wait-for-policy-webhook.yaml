apiVersion: v1
kind: ServiceAccount
metadata:
  name: wait-for-policy-webhook
  namespace: cosign-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wait-for-policy-webhook
  namespace: cosign-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wait-for-policy-webhook
  namespace: cosign-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
subjects:
  - kind: ServiceAccount
    name: wait-for-policy-webhook
    namespace: cosign-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wait-for-policy-webhook
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-policy-webhook
  namespace: cosign-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 60
  template:
    spec:
      serviceAccountName: wait-for-policy-webhook
      restartPolicy: Never
      containers:
        - name: wait
          image: curlimages/curl:8.11.1
          command:
            - sh
            - -c
            - |
              TOKEN="$(cat /var/run/secrets/kubernetes.io/serviceaccount/token)"
              CACERT="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
              API="https://kubernetes.default.svc/api/v1/namespaces/cosign-system/endpoints/webhook"

              for i in $(seq 1 60); do
                if curl -fsS --cacert "$CACERT" -H "Authorization: Bearer $TOKEN" "$API" | grep -q '"addresses"'; then
                  echo "policy-controller webhook endpoint is ready"
                  exit 0
                fi
                echo "waiting for policy-controller webhook endpoint..."
                sleep 5
              done
              echo "policy-controller webhook endpoint is not ready after 300s"
              exit 1
