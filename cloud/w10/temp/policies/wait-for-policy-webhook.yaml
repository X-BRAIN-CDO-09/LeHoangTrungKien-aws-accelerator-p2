apiVersion: v1
kind: ServiceAccount
metadata:
  name: wait-for-policy-webhook
  namespace: cosign-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: wait-for-policy-webhook
  namespace: cosign-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
rules:
  - apiGroups: [""]
    resources: ["endpoints"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: wait-for-policy-webhook
  namespace: cosign-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
subjects:
  - kind: ServiceAccount
    name: wait-for-policy-webhook
    namespace: cosign-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: wait-for-policy-webhook
---
apiVersion: batch/v1
kind: Job
metadata:
  name: wait-for-policy-webhook
  namespace: cosign-system
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
spec:
  backoffLimit: 0
  ttlSecondsAfterFinished: 60
  template:
    spec:
      serviceAccountName: wait-for-policy-webhook
      restartPolicy: Never
      containers:
        - name: wait
          image: bitnami/kubectl:1.35
          command:
            - sh
            - -c
            - |
              for i in $(seq 1 60); do
                if kubectl -n cosign-system get endpoints webhook -o jsonpath='{.subsets[0].addresses[0].ip}' 2>/dev/null | grep -q .; then
                  echo "policy-controller webhook endpoint is ready"
                  exit 0
                fi
                echo "waiting for policy-controller webhook endpoint..."
                sleep 5
              done
              echo "policy-controller webhook endpoint is not ready after 300s"
              exit 1
