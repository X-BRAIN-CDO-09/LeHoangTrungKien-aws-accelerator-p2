# ArgoCD App: Deploy Gatekeeper ConstraintTemplates and Constraints
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-gatekeeper-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/X-BRAIN-CDO-09/LeHoangTrungKien-aws-accelerator-p2.git
    path: cloud/w10/temp/security-rbac-admission/gatekeeper
    targetRevision: main
    directory:
      recurse: true
      exclude: "tests/*"
  destination:
    server: https://kubernetes.default.svc
    namespace: gatekeeper-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true

