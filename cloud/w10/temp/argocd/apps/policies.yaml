# ArgoCD App: Sync image signature policies after Policy Controller is installed.
# A PreSync hook in policies/ waits for the conversion webhook endpoint first.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: supply-chain-policies
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "4"
spec:
  project: default
  source:
    repoURL: https://github.com/X-BRAIN-CDO-09/LeHoangTrungKien-aws-accelerator-p2.git
    path: cloud/w10/temp/policies
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: cosign-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - SkipDryRunOnMissingResource=true
