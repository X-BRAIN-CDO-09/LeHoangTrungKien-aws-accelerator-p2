# ArgoCD App: Deploy Pod ServiceAccount and minimal workload RBAC
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: security-workload-identity
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://github.com/X-BRAIN-CDO-09/LeHoangTrungKien-aws-accelerator-p2.git
    path: cloud/w10/temp/security-rbac-admission/workload-identity
    targetRevision: main
  destination:
    server: https://kubernetes.default.svc
    namespace: demo
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true

