apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: demo-deployer
  namespace: demo
rules:
  - apiGroups: ["", "apps", "argoproj.io"]
    resources:
      - pods
      - pods/log
      - services
      - configmaps
      - deployments
      - replicasets
      - rollouts
    verbs: ["get", "list", "watch", "create", "update", "patch"]

