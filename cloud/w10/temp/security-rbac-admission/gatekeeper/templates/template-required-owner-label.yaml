apiVersion: templates.gatekeeper.sh/v1
kind: ConstraintTemplate
metadata:
  name: k8srequiredownerlabel
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  crd:
    spec:
      names:
        kind: K8sRequiredOwnerLabel
  targets:
    - target: admission.k8s.gatekeeper.sh
      rego: |
        package k8srequiredownerlabel

        violation[{"msg": msg}] {
          input.review.kind.kind == "Pod"
          not input.review.object.metadata.labels.owner
          msg := "Pod metadata.labels.owner is required"
        }

        violation[{"msg": msg}] {
          workload_kind
          not input.review.object.spec.template.metadata.labels.owner
          msg := sprintf("%v spec.template.metadata.labels.owner is required", [input.review.kind.kind])
        }

        workload_kind {
          input.review.kind.kind == "Deployment"
        }

        workload_kind {
          input.review.kind.kind == "Rollout"
        }
