apiVersion: apps/v1
kind: Deployment
metadata:
  name: allow-deployment-owner
  namespace: demo
  labels:
    owner: platform-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app: allow-deployment-owner
  template:
    metadata:
      labels:
        app: allow-deployment-owner
        owner: platform-team
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: app
          image: docker.io/library/nginx:1.27.0
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
---
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: allow-rollout-owner
  namespace: demo
  labels:
    owner: platform-team
spec:
  replicas: 1
  selector:
    matchLabels:
      app: allow-rollout-owner
  template:
    metadata:
      labels:
        app: allow-rollout-owner
        owner: platform-team
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
      containers:
        - name: app
          image: docker.io/library/nginx:1.27.0
          resources:
            limits:
              cpu: 100m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
  strategy:
    canary:
      steps:
        - setWeight: 100
