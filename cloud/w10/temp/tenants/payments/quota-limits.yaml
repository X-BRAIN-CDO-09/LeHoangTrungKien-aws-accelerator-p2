apiVersion: v1
kind: ResourceQuota
metadata:
  name: payments-budget
  namespace: payments
  labels:
    owner: payments-team
    tenant: payments
spec:
  hard:
    requests.cpu: "1"
    requests.memory: 1Gi
    limits.cpu: "2"
    limits.memory: 2Gi
    pods: "10"
    services: "5"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: payments-defaults
  namespace: payments
  labels:
    owner: payments-team
    tenant: payments
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 50m
        memory: 64Mi
      default:
        cpu: 200m
        memory: 128Mi
      max:
        cpu: "1"
        memory: 1Gi
