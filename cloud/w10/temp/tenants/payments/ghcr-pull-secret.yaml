apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: payments-ghcr-pull-secret
  namespace: payments
  labels:
    owner: payments-team
    tenant: payments
spec:
  refreshInterval: 30s
  secretStoreRef:
    name: aws-cluster-store
    kind: ClusterSecretStore
  target:
    name: ghcr-pull-secret
    creationPolicy: Owner
    template:
      type: kubernetes.io/dockerconfigjson
      data:
        .dockerconfigjson: |
          {
            "auths": {
              "ghcr.io": {
                "username": "{{ .username }}",
                "password": "{{ .password }}",
                "auth": "{{ printf "%s:%s" .username .password | b64enc }}"
              }
            }
          }
  data:
    - secretKey: username
      remoteRef:
        key: demo/ghcr/pull-secret
        property: username
    - secretKey: password
      remoteRef:
        key: demo/ghcr/pull-secret
        property: password
