apiVersion: v1
kind: Pod
metadata:
  name: payments-curl-demo-api
  namespace: payments
  labels:
    app: payments-curl-demo-api
    owner: payments-team
    tenant: payments
spec:
  restartPolicy: Never
  imagePullSecrets:
    - name: ghcr-pull-secret
  securityContext:
    runAsNonRoot: true
    runAsUser: 10001
  containers:
    - name: curl
      image: ghcr.io/x-brain-cdo-09/lehoangtrungkien-aws-accelerator-p2/w10-api:0.0.4
      command:
        - python
        - -c
        - |
          import urllib.request

          url = "http://api.demo.svc.cluster.local"
          print(f"trying {url}")
          try:
              body = urllib.request.urlopen(url, timeout=5).read().decode()
              print("UNEXPECTED_SUCCESS")
              print(body[:200])
          except Exception as exc:
              print(f"BLOCKED_OR_FAILED: {type(exc).__name__}: {exc}")
      resources:
        limits:
          cpu: 100m
          memory: 128Mi
      securityContext:
        allowPrivilegeEscalation: false
