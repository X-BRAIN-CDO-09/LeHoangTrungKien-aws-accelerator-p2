apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: app-secrets
  namespace: team-a
spec:
  refreshInterval: 30s
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  target:
    name: app-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /w10/team-a/app
        property: DB_PASSWORD
    - secretKey: API_KEY
      remoteRef:
        key: /w10/team-a/app
        property: API_KEY
