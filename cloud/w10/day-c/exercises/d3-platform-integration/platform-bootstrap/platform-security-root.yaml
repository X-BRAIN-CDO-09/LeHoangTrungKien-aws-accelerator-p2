apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: w10-platform-security
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/REPLACE_ME/LeHoangTrungKien-aws-accelerator-p2.git
    targetRevision: main
    path: cloud/w10
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
