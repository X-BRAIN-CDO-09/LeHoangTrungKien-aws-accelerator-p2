apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: flipkart-backend-secrets
  namespace: flipkart
spec:
  refreshInterval: 30s
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secretsmanager
  target:
    name: flipkart-backend-secrets
    creationPolicy: Owner
  data:
    - secretKey: DB_PASSWORD
      remoteRef:
        key: /w10/flipkart/backend
        property: DB_PASSWORD
    - secretKey: API_KEY
      remoteRef:
        key: /w10/flipkart/backend
        property: API_KEY
